spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration-test
  thymeleaf:
    cache: false

app:
  teacher:
    username: teacher
    password: teacher123

logging:
  level:
    org.springframework: WARN
    com.example.testing: INFO
