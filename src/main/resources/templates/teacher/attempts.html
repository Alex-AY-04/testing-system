<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Попытки студентов')}"></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="/teacher/dashboard">← Назад в панель</a>
    </div>
</nav>

<div class="container">
    <h3 class="mb-4">Попытки студентов</h3>

    <div class="alert alert-info" th:if="${#lists.isEmpty(rows)}">
        Пока нет ни одной попытки.
    </div>

    <table class="table table-striped bg-white shadow-sm" th:if="${!#lists.isEmpty(rows)}">
        <thead>
        <tr>
            <th>Тест</th>
            <th>Студент</th>
            <th>Правильных / Всего</th>
            <th>Оценка</th>
            <th>Дата завершения</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row : ${rows}">
            <td th:text="${row.testName}">Название теста</td>
            <td th:text="${row.studentName}">Имя</td>
            <td>
                <span th:text="${row.correctAns}">X</span>
                / <span th:text="${row.total}">Y</span>
            </td>
            <td>
                <span class="badge"
                      th:classappend="${row.grade >= 4} ? 'bg-success' : (${row.grade == 3} ? 'bg-warning text-dark' : 'bg-danger')"
                      th:text="${row.grade}">5</span>
            </td>
            <td th:text="${#temporals.format(row.endTime, 'dd.MM.yyyy HH:mm')}">01.01.2025 12:00</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
