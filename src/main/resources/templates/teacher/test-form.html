<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Редактор теста')}"></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="/teacher/dashboard">← Назад в панель</a>
    </div>
</nav>

<div class="container">
    <h3 class="mb-4" th:text="${mode == 'new'} ? 'Новый тест' : 'Редактирование теста'">Редактор</h3>

    <div class="alert alert-danger" th:if="${formError}" th:text="${formError}"></div>

    <form method="post"
          id="testForm"
          th:action="${mode == 'new'} ? @{/teacher/tests} : @{'/teacher/tests/' + ${form.id}}"
          th:object="${form}"
          onsubmit="return validateForm();">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="mb-4 d-flex align-items-center gap-3">
            <label for="name" class="form-label mb-0 fw-semibold" style="min-width: 150px;">Название теста</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required>
            <button type="submit" class="btn btn-success">Сохранить тест</button>
        </div>

        <div id="questions">
            <div class="question-block" th:each="q, it : *{questions}">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong>Вопрос <span class="q-number" th:text="${it.index + 1}">1</span></strong>
                    <button type="button" class="btn btn-sm btn-outline-danger remove-question">Удалить вопрос</button>
                </div>
                <input type="hidden" th:name="'questions[' + ${it.index} + '].id'" th:value="${q.id}">
                <div class="mb-2">
                    <label class="form-label">Формулировка</label>
                    <textarea class="form-control"
                              rows="2"
                              th:name="'questions[' + ${it.index} + '].wording'"
                              th:text="${q.wording}"></textarea>
                </div>
                <div class="row g-2">
                    <div class="col-md-6">
                        <label class="form-label text-success">Правильный ответ</label>
                        <input type="text" class="form-control"
                               th:name="'questions[' + ${it.index} + '].correctAns'"
                               th:value="${q.correctAns}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Неправильный ответ 1</label>
                        <input type="text" class="form-control"
                               th:name="'questions[' + ${it.index} + '].incorrectAns1'"
                               th:value="${q.incorrectAns1}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Неправильный ответ 2</label>
                        <input type="text" class="form-control"
                               th:name="'questions[' + ${it.index} + '].incorrectAns2'"
                               th:value="${q.incorrectAns2}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Неправильный ответ 3</label>
                        <input type="text" class="form-control"
                               th:name="'questions[' + ${it.index} + '].incorrectAns3'"
                               th:value="${q.incorrectAns3}">
                    </div>
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-outline-primary" id="addQuestion">+ Добавить вопрос</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Возвращает HTML нового пустого блока вопроса
    function newQuestionHtml(index) {
        return (
          '<div class="question-block">' +
            '<div class="d-flex justify-content-between align-items-center mb-2">' +
              '<strong>Вопрос <span class="q-number">' + (index + 1) + '</span></strong>' +
              '<button type="button" class="btn btn-sm btn-outline-danger remove-question">Удалить вопрос</button>' +
            '</div>' +
            '<input type="hidden" name="questions[' + index + '].id" value="">' +
            '<div class="mb-2">' +
              '<label class="form-label">Формулировка</label>' +
              '<textarea class="form-control" rows="2" name="questions[' + index + '].wording"></textarea>' +
            '</div>' +
            '<div class="row g-2">' +
              '<div class="col-md-6"><label class="form-label text-success">Правильный ответ</label>' +
                '<input type="text" class="form-control" name="questions[' + index + '].correctAns"></div>' +
              '<div class="col-md-6"><label class="form-label">Неправильный ответ 1</label>' +
                '<input type="text" class="form-control" name="questions[' + index + '].incorrectAns1"></div>' +
              '<div class="col-md-6"><label class="form-label">Неправильный ответ 2</label>' +
                '<input type="text" class="form-control" name="questions[' + index + '].incorrectAns2"></div>' +
              '<div class="col-md-6"><label class="form-label">Неправильный ответ 3</label>' +
                '<input type="text" class="form-control" name="questions[' + index + '].incorrectAns3"></div>' +
            '</div>' +
          '</div>'
        );
    }

    function renumber() {
        var container = document.getElementById('questions');
        var blocks = container.querySelectorAll('.question-block');
        blocks.forEach(function (block, idx) {
            var numEl = block.querySelector('.q-number');
            if (numEl) numEl.textContent = (idx + 1);
            // перенумеровываем name для каждого input/textarea
            block.querySelectorAll('input[name^="questions["], textarea[name^="questions["]').forEach(function (el) {
                el.name = el.name.replace(/questions\[\d+\]/, 'questions[' + idx + ']');
            });
        });
    }

    document.getElementById('addQuestion').addEventListener('click', function () {
        var container = document.getElementById('questions');
        var idx = container.querySelectorAll('.question-block').length;
        container.insertAdjacentHTML('beforeend', newQuestionHtml(idx));
    });

    document.getElementById('questions').addEventListener('click', function (e) {
        if (e.target && e.target.classList.contains('remove-question')) {
            var block = e.target.closest('.question-block');
            block.parentNode.removeChild(block);
            renumber();
        }
    });

    // Клиентская валидация: название не пустое, минимум один полностью заполненный вопрос.
    function validateForm() {
        var name = document.getElementById('name').value.trim();
        if (!name) {
            alert('Введите название теста.');
            return false;
        }
        var blocks = document.querySelectorAll('.question-block');
        var anyFull = false;
        blocks.forEach(function (b) {
            var w = b.querySelector('textarea[name$=".wording"]').value.trim();
            var c = b.querySelector('input[name$=".correctAns"]').value.trim();
            var i1 = b.querySelector('input[name$=".incorrectAns1"]').value.trim();
            var i2 = b.querySelector('input[name$=".incorrectAns2"]').value.trim();
            var i3 = b.querySelector('input[name$=".incorrectAns3"]').value.trim();
            if (w && c && i1 && i2 && i3) anyFull = true;
        });
        if (!anyFull) {
            alert('В тесте должен быть хотя бы один полностью заполненный вопрос.');
            return false;
        }
        return true;
    }
</script>
</body>
</html>
