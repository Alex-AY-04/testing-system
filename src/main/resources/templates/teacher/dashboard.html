<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Панель преподавателя')}"></head>
<body>
<nav class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Система тестирования</a>
        <div>
            <span class="text-muted me-3">Преподаватель</span>
            <form method="post" action="/teacher/logout" style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-sm btn-outline-secondary">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="mb-4">
        <a href="/teacher/tests/new" class="btn btn-primary me-2">Создать тест</a>
        <a href="/teacher/attempts" class="btn btn-outline-primary">Просмотреть попытки студентов</a>
    </div>

    <h3>Тесты</h3>

    <div class="alert alert-info" th:if="${#lists.isEmpty(tests)}">
        Пока нет ни одного теста. Создайте первый.
    </div>

    <div class="list-group">
        <div class="list-group-item d-flex justify-content-between align-items-center"
             th:each="t : ${tests}">
            <span class="fw-semibold" th:text="${t.name}">Название</span>
            <div>
                <a th:href="@{'/teacher/tests/' + ${t.id} + '/edit'}" class="btn btn-sm btn-outline-primary me-2">
                    Редактировать
                </a>
                <button type="button"
                        class="btn btn-sm btn-outline-danger"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteModal"
                        th:attr="data-test-id=${t.id},data-test-name=${t.name}">
                    Удалить
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Модалка удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form method="post" id="deleteForm" class="modal-content">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="modal-header">
                <h5 class="modal-title">Удалить тест?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                Удалить тест <strong id="deleteTestName">—</strong>? Это действие необратимо
                и удалит также все вопросы и попытки студентов.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-danger">Удалить</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('deleteModal').addEventListener('show.bs.modal', function (e) {
        var btn = e.relatedTarget;
        var id = btn.getAttribute('data-test-id');
        var name = btn.getAttribute('data-test-name');
        document.getElementById('deleteForm').action = '/teacher/tests/' + id + '/delete';
        document.getElementById('deleteTestName').textContent = name;
    });
</script>
</body>
</html>
