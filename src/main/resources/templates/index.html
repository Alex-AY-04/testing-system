<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Главная')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-auto text-center">
            <h1 class="mb-5">Кто вы?</h1>

            <button type="button"
                    class="btn btn-primary big-choice me-3"
                    data-bs-toggle="modal"
                    data-bs-target="#studentModal">
                Я студент
            </button>

            <a href="/teacher/login" class="btn btn-secondary big-choice">
                Я преподаватель
            </a>
        </div>
    </div>
</div>

<!-- Модальное окно ввода имени студента -->
<div class="modal fade" id="studentModal" tabindex="-1" aria-labelledby="studentModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <form method="post" action="/student/name" class="modal-content" th:object="${null}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="modal-header">
                <h5 class="modal-title" id="studentModalLabel">Представьтесь, пожалуйста</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <label for="fullName" class="form-label">Имя и фамилия</label>
                <input type="text"
                       class="form-control"
                       id="fullName"
                       name="fullName"
                       th:value="${enteredName}"
                       placeholder="Например: Иван Петров"
                       required>
                <div class="form-text">Два слова через пробел. Буквы и дефис, до 30 символов каждое.</div>
                <div class="text-danger mt-2"
                     th:if="${nameError}"
                     th:text="${nameError}"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-primary">Продолжить</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Если есть ошибка валидации имени — сразу раскрыть модалку -->
<script th:if="${nameError}">
    document.addEventListener('DOMContentLoaded', function () {
        var modal = new bootstrap.Modal(document.getElementById('studentModal'));
        modal.show();
    });
</script>
</body>
</html>
