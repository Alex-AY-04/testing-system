<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Список тестов')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Доступные тесты</h2>
        <div>
            <span class="text-muted me-2">Студент:</span>
            <strong th:text="${studentName}">Имя</strong>
        </div>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(tests)}">
        Тестов пока нет. Попросите преподавателя создать тест.
    </div>

    <div class="list-group">
        <div class="list-group-item d-flex justify-content-between align-items-center"
             th:each="t : ${tests}">
            <span class="fw-semibold" th:text="${t.name}">Название теста</span>
            <button type="button"
                    class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#startModal"
                    th:attr="data-test-id=${t.id},data-test-name=${t.name}">
                Пройти тест
            </button>
        </div>
    </div>
</div>

<!-- Модалка подтверждения старта -->
<div class="modal fade" id="startModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form method="post" action="/student/attempts/start" class="modal-content">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="testId" id="startTestId" value="">
            <div class="modal-header">
                <h5 class="modal-title">Начать тест?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                Вы хотите начать тест <strong id="startTestName">—</strong> сейчас?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Нет</button>
                <button type="submit" class="btn btn-primary">Да</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('startModal').addEventListener('show.bs.modal', function (event) {
        var button = event.relatedTarget;
        var testId = button.getAttribute('data-test-id');
        var testName = button.getAttribute('data-test-name');
        document.getElementById('startTestId').value = testId;
        document.getElementById('startTestName').textContent = testName;
    });
</script>
</body>
</html>
