<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Вопрос')}"></head>
<body th:attr="data-current-number=${currentNumber}">
<!-- CSRF-токен для AJAX -->
<meta name="_csrf"        th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <!-- Пагинация -->
    <div class="mb-4 text-center">
        <div th:each="q, it : ${questions}" style="display: inline-block;">
            <form method="post" action="/student/attempts/navigate" style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="currentNumber" th:value="${currentNumber}">
                <input type="hidden" name="selectedAnswer" id="paginationSelected" value="">
                <input type="hidden" name="target" th:value="${it.index + 1}">
                <button type="submit"
                        class="pagination-dot"
                        th:attr="data-question-number=${it.index + 1}"
                        th:classappend="${(q.selectedAnswer != null ? 'answered ' : '') + (it.index + 1 == currentNumber ? 'active' : '')}"
                        onclick="syncSelectedToPagination(this)"
                        th:text="${it.index + 1}">1</button>
            </form>
        </div>
    </div>

    <!-- Формулировка и варианты -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-4">
                Вопрос <span th:text="${currentNumber}">1</span> из <span th:text="${totalQuestions}">N</span>
            </h4>
            <p class="fs-5 mb-4" th:text="${current.wording}">Формулировка</p>

            <form method="post" id="questionForm" action="/student/attempts/navigate">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="currentNumber" th:value="${currentNumber}">

                <div class="form-check mb-2" th:each="opt, oit : ${current.shuffledOptions}">
                    <input class="form-check-input"
                           type="radio"
                           name="selectedAnswer"
                           th:id="'opt' + ${oit.index}"
                           th:value="${opt}"
                           th:checked="${current.selectedAnswer != null and current.selectedAnswer == opt}">
                    <label class="form-check-label" th:for="'opt' + ${oit.index}" th:text="${opt}">Ответ</label>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <!-- Кнопка-сабмит сама несёт target через name/value - никакого JS для навигации -->
                    <button type="submit"
                            class="btn btn-outline-secondary"
                            name="target"
                            th:value="${currentNumber - 1}"
                            th:disabled="${isFirst}">
                        Назад
                    </button>

                    <button type="submit"
                            class="btn btn-primary"
                            th:if="${!isLast}"
                            name="target"
                            th:value="${currentNumber + 1}">
                        Далее
                    </button>

                    <button type="button"
                            class="btn btn-success"
                            th:if="${isLast}"
                            data-bs-toggle="modal"
                            data-bs-target="#finishModal">
                        Завершить тест
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Скрытая форма завершения теста -->
<div class="modal fade" id="finishModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form method="post" action="/student/attempts/finish" class="modal-content" id="finishForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" name="currentNumber" th:value="${currentNumber}">
            <input type="hidden" name="selectedAnswer" id="finishSelected" value="">
            <div class="modal-header">
                <h5 class="modal-title">Завершить тест?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                После завершения вы не сможете изменить ответы.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" class="btn btn-success">Завершить</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        const csrfMeta  = document.querySelector('meta[name="_csrf"]');
        const csrfHdr   = document.querySelector('meta[name="_csrf_header"]');
        const csrfToken  = csrfMeta ? csrfMeta.getAttribute('content') : '';
        const csrfHeader = csrfHdr  ? csrfHdr.getAttribute('content')  : 'X-CSRF-TOKEN';
        const currentNumber = parseInt(document.body.dataset.currentNumber, 10);

        // --- Сохранение ответа на сервер сразу при клике по радио-кнопке ---
        function saveAnswer(selectedAnswer) {
            const body = new URLSearchParams();
            body.set('currentNumber', currentNumber);
            body.set('selectedAnswer', selectedAnswer);

            return fetch('/student/attempts/answer', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [csrfHeader]: csrfToken
                },
                body: body.toString(),
                credentials: 'same-origin'
            });
        }

        // --- Пометить квадратик текущего вопроса как «отвечено» ---
        function markCurrentDotAnswered() {
            const dot = document.querySelector(
                '.pagination-dot[data-question-number="' + currentNumber + '"]'
            );
            if (dot && !dot.classList.contains('answered')) {
                dot.classList.add('answered');
            }
        }

        // Обработчик клика по радио-кнопке: сохраняем ответ + красим квадратик
        document.querySelectorAll('input[name="selectedAnswer"]').forEach(function (radio) {
            radio.addEventListener('change', function (e) {
                if (!e.target.checked) return;
                markCurrentDotAnswered();
                saveAnswer(e.target.value).catch(function () {
                    // Если сеть отвалилась — ответ всё равно уйдёт с формой Далее/Назад/Завершить
                });
                // Синхронизируем скрытые поля финальной формы
                const finishField = document.getElementById('finishSelected');
                if (finishField) finishField.value = e.target.value;
            });
        });

        // --- Пагинация (клик по номеру) ---
        window.syncSelectedToPagination = function (btn) {
            const form = btn.closest('form');
            const selected = document.querySelector('input[name="selectedAnswer"]:checked');
            const hidden = form.querySelector('input[name="selectedAnswer"]');
            if (hidden) hidden.value = selected ? selected.value : '';
        };

        // --- Модалка завершения: копируем выбранный ответ в скрытое поле ---
        const finishModal = document.getElementById('finishModal');
        if (finishModal) {
            finishModal.addEventListener('show.bs.modal', function () {
                const selected = document.querySelector('input[name="selectedAnswer"]:checked');
                document.getElementById('finishSelected').value = selected ? selected.value : '';
            });
        }
    })();
</script>
</body>
</html>
