<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Система тестирования</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f7f7fb; }
        .big-choice {
            border-radius: 1rem;
            padding: 2rem 3rem;
            font-size: 1.5rem;
            min-width: 260px;
        }
        .pagination-dot {
            display: inline-flex;
            width: 40px; height: 40px;
            margin: 2px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            align-items: center; justify-content: center;
            cursor: pointer;
            background: #fff;
        }
        .pagination-dot.answered { background: #cfd4dc; }
        .pagination-dot.active   { border: 2px solid #0d6efd; }
        .question-block {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #fff;
        }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Система тестирования</a>
    </div>
</nav>
</body>
</html>
